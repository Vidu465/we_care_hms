<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>We Care — Login</title>
  <link rel="stylesheet" href="../shared/style.css">
  <style>
    body { background: #f0edf8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: white; border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); padding: 42px 44px; width: 100%; max-width: 420px; }
    .login-box h1 { font-size: 24px; font-weight: 700; color: var(--purple-dark); text-align: center; margin-bottom: 6px; }
    .login-box p  { color: var(--text-muted); text-align: center; font-size: 14px; margin-bottom: 28px; }
    #msg { display: none; padding: 10px; border-radius: 8px; margin-bottom: 14px; font-size: 14px; font-weight: 500; }
    #msg.error   { background: #ffebee; color: #c62828; display: block; }
    #msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .register-link { text-align: center; margin-top: 16px; font-size: 14px; color: var(--text-muted); }
    .register-link a { color: var(--purple); font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
<div class="login-box">
  <h1>💜 We Care</h1>
  <p>Your Health; Our Priority</p>
  <div id="msg"></div>
  <div class="form-group" style="margin-bottom:14px">
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email">
  </div>
  <div class="form-group" style="margin-bottom:20px">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password">
  </div>
  <button class="btn btn-purple" style="width:100%;padding:13px;font-size:15px;" onclick="login()">Login</button>
  <p class="register-link">Don't have an account? <a href="register.html">Register here</a></p>
</div>

<script>
async function login() {
  const msg = document.getElementById('msg');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { msg.textContent = 'Please enter email and password.'; msg.className = 'error'; return; }
  try {
    const res = await fetch('../../backend/auth/login.php', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
    const json = await res.json();
    if (json.success) {
      localStorage.setItem('user', JSON.stringify(json.user));
      msg.textContent = 'Login successful! Redirecting…'; msg.className = 'success';
      const routes = { admin:'../admin/dashboard.html', doctor:'../admin/dashboard.html', receptionist:'../appointment/appointments.html', patient:'../appointment/appointments.html' };
      setTimeout(() => window.location.href = routes[json.user.role] || '../admin/dashboard.html', 1200);
    } else { msg.textContent = json.message; msg.className = 'error'; }
  } catch(e) { msg.textContent = 'Server error.'; msg.className = 'error'; }
}
</script>
</body>
</html>
