<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We Care — Register</title>
  <link rel="stylesheet" href="../shared/style.css">
  <style>
    body { background: #f0edf8; display: flex; flex-direction: column; min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
    .public-nav { background: white; padding: 14px 40px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .nav-logo { font-size: 20px; font-weight: 700; color: var(--purple-dark); }
    .nav-links a { margin-left: 20px; text-decoration: none; color: var(--text-dark); font-size: 14px; }
    .nav-links a.active { color: var(--purple); font-weight: 600; }
    .nav-links .btn { margin-left: 14px; }
    .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .auth-box { background: white; border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 36px 40px; width: 100%; max-width: 700px; }
    .auth-box h1 { font-size: 22px; font-weight: 700; color: var(--purple-dark); margin-bottom: 6px; }
    .auth-box p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
    .role-tabs { display: flex; gap: 6px; margin-bottom: 24px; background: var(--gray-100); border-radius: 10px; padding: 6px; }
    .role-tab { flex: 1; padding: 9px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-muted); border: none; background: transparent; transition: all 0.2s; }
    .role-tab.active { background: var(--purple); color: white; }
    .forgot { font-size: 13px; color: var(--purple); text-decoration: none; float: right; }
    .login-link { text-align: center; margin-top: 16px; font-size: 14px; color: var(--text-muted); }
    .login-link a { color: var(--purple); font-weight: 600; text-decoration: none; }
    #msg { display: none; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; font-weight: 500; }
    #msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
    #msg.error   { background: #ffebee; color: #c62828; display: block; }
  </style>
</head>
<body>
<nav class="public-nav">
  <div class="nav-logo">💜 We Care</div>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#" class="active">Appointment</a>
    <a href="#">Services</a>
    <a href="#">About Us</a>
    <a href="#">Contact Us</a>
    <a href="login.html" class="btn btn-purple">Login</a>
    <a href="register.html" class="btn" style="background:transparent;border:2px solid var(--purple);color:var(--purple);">Sign In</a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-box">
    <h1>Create Account</h1>
    <p>Register to access We Care services</p>
    <div id="msg"></div>

    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('patient',this)">Patient</button>
      <button class="role-tab" onclick="setRole('doctor',this)">Doctor</button>
      <button class="role-tab" onclick="setRole('receptionist',this)">Receptionist</button>
      <button class="role-tab" onclick="setRole('admin',this)">Admin</button>
    </div>

    <input type="hidden" id="role" value="patient">

    <div class="form-grid">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" id="first_name" placeholder="First Name">
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" id="last_name" placeholder="Last Name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Email">
      </div>
      <div class="form-group">
        <label>Mobile Number</label>
        <input type="text" id="mobile" placeholder="Mobile Number">
      </div>
      <div class="form-group">
        <label>NIC</label>
        <input type="text" id="nic" placeholder="NIC">
      </div>
      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" id="dob">
      </div>
      <div class="form-group form-full">
        <label>Address</label>
        <textarea id="address" placeholder="Address"></textarea>
      </div>
      <div class="form-group">
        <label>Gender</label>
        <select id="gender">
          <option value="">Select Gender</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Password">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm_password" placeholder="Confirm Password">
      </div>
    </div>

    <button class="btn btn-purple" style="width:100%;margin-top:8px;padding:13px;" onclick="register()">Register</button>
    <p class="login-link">Already have an account? <a href="login.html">Login here</a></p>
  </div>
</div>

<script>
function setRole(role, el) {
  document.getElementById('role').value = role;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

async function register() {
  const msg = document.getElementById('msg');
  msg.className = '';
  const data = {
    first_name: document.getElementById('first_name').value.trim(),
    last_name:  document.getElementById('last_name').value.trim(),
    email:      document.getElementById('email').value.trim(),
    mobile:     document.getElementById('mobile').value.trim(),
    nic:        document.getElementById('nic').value.trim(),
    dob:        document.getElementById('dob').value,
    address:    document.getElementById('address').value.trim(),
    gender:     document.getElementById('gender').value,
    password:   document.getElementById('password').value,
    confirm_password: document.getElementById('confirm_password').value,
    role:       document.getElementById('role').value
  };
  if (!data.first_name || !data.email || !data.password) {
    msg.textContent = 'Please fill all required fields.';
    msg.className = 'error'; return;
  }
  if (data.password !== data.confirm_password) {
    msg.textContent = 'Passwords do not match.';
    msg.className = 'error'; return;
  }
  try {
    const res = await fetch('../../backend/auth/register.php', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
    const json = await res.json();
    if (json.success) {
      msg.textContent = 'Registration successful! Redirecting to login…';
      msg.className = 'success';
      setTimeout(() => window.location.href = 'login.html', 1800);
    } else {
      msg.textContent = json.message || 'Registration failed.';
      msg.className = 'error';
    }
  } catch(e) {
    msg.textContent = 'Server error. Please try again.';
    msg.className = 'error';
  }
}
</script>
</body>
</html>
